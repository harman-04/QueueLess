spring.application.name=backend

spring.config.import=optional:file:.env[.properties]

spring.data.mongodb.uri=${MONGODB_URI}
#spring.data.mongodb.database=queueless
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

# JWT settings
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Mail Configuration
# ====================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Optional
spring.mail.default-encoding=UTF-8


razorpay.key=${RAZORPAY_KEY}
razorpay.secret=${RAZORPAY_SECRET}


logging.level.org.springframework.messaging.simp=WARN
#logging.level.org.springframework.web.socket=DEBUG
logging.level.org.springframework.security=DEBUG

logging.level.org.springframework.web.socket=WARN
logging.level.org.springframework.messaging=WARN

server.ssl.key-store=classpath:localhost.p12
server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD}
server.ssl.key-store-type=PKCS12
#server.ssl.key-alias=localhost
server.port=8443


# Rate limiting
rate.limit.capacity=100
rate.limit.refill=100
rate.limit.duration=PT1M
# ISO-8601 duration (1 minute)

# CORS
cors.allowed-origins=https://localhost:5173,https://localhost:3000

# WebSocket
websocket.allowed-origins=${cors.allowed-origins}

spring.cache.cache-names=verifiedEmails
spring.cache.caffeine.spec=maximumSize=10000,expireAfterWrite=5m


token.notification.before-minutes=5