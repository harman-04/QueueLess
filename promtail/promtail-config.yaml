server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'logstream'
      # Add a custom label "job" based on the container name
      - source_labels: ['__meta_docker_container_name']
        regex: '/queueless-(.*)'
        target_label: 'job'
        replacement: '$1'
      # Fallback: if container name doesn't match, set job to "other"
      - source_labels: ['__meta_docker_container_name']
        regex: '.+'
        target_label: 'job'
        replacement: 'other'